services:
    next_app:
        build:
            context: .
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
                - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
        ports:
            - "${PORT}:${PORT}"
        environment:
            - PORT=${PORT}
            - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
            - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        env_file:
            - .env
        networks:
            - blog-prod
        expose:
            - ${PORT}
        restart: always
networks:
    blog-prod:
        name: blog-prod
        driver: bridge
        external: true
